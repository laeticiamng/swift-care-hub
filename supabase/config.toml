[auth]
# Enable leaked password protection (HaveIBeenPwned API check)
# Blocks sign-ups and password changes with known compromised passwords
enable_signup = true
password_min_length = 8

[auth.external.hibp]
enabled = true

[functions.seed-data]
# Re-enabled JWT verification — seed data requires authentication
verify_jwt = true

[functions.csp-report]
# CSP violation reports are sent by browsers without auth headers
verify_jwt = false

[functions.ai-clinical]
verify_jwt = false

[functions.contact-lead]
verify_jwt = false

[functions.status-monitor]
verify_jwt = false

[functions.send-alert]
verify_jwt = false
